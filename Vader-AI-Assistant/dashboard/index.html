<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VADER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --bg: #0A0E12;
    --bg-panel: #10161C;
    --line: #1C252D;
    --core: #3DDBFF;
    --core-dim: #1B5C6E;
    --text: #E6EDF2;
    --text-dim: #6B7884;
    --warn: #FF9D3D;
    --ok: #3DFFA0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 48px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .frame {
    width: 100%;
    max-width: 760px;
  }

  /* --- Core indicator (the signature element) --- */
  .core-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    padding: 40px 0 32px;
  }

  .core {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .core::before, .core::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid var(--core-dim);
  }

  .core::after {
    inset: -14px;
    opacity: 0.5;
  }

  .core-dot {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--core), var(--core-dim) 70%);
    box-shadow: 0 0 24px 4px rgba(61, 219, 255, 0.35);
    transition: all 0.4s ease;
  }

  .core.idle .core-dot {
    animation: breathe 4s ease-in-out infinite;
  }

  .core.working .core-dot {
    animation: pulse 1.1s ease-in-out infinite;
  }

  .core.working::before {
    animation: ring-spin 3s linear infinite;
    border-top-color: var(--core);
  }

  .core.speaking .core-dot {
    animation: speak-pulse 0.5s ease-in-out infinite alternate;
    background: radial-gradient(circle at 35% 30%, var(--ok), var(--core-dim) 70%);
    box-shadow: 0 0 28px 6px rgba(61, 255, 160, 0.4);
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.85; }
    50% { transform: scale(1.06); opacity: 1; }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(0.92); }
    50% { transform: scale(1.12); }
  }

  @keyframes speak-pulse {
    0% { transform: scale(0.95); }
    100% { transform: scale(1.15); }
  }

  @keyframes ring-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .status-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--core);
  }

  .status-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  /* --- Header --- */
  .title-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--line);
    padding-bottom: 16px;
    margin-bottom: 8px;
  }

  .title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--text);
  }

  .timestamp {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* --- Panels --- */
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 20px 22px;
    margin-bottom: 16px;
  }

  .panel-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .briefing-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
  }

  .briefing-text.placeholder {
    color: var(--text-dim);
    font-style: italic;
  }

  .data-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .data-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .data-item .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    display: inline-block;
    margin-right: 6px;
  }

  .data-item.done .dot { background: var(--ok); }
  .data-item.active .dot { background: var(--core); box-shadow: 0 0 6px var(--core); }

  /* --- Controls --- */
  .controls {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--core-dim);
    color: var(--core);
    padding: 10px 18px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  button:hover {
    background: rgba(61, 219, 255, 0.08);
    border-color: var(--core);
  }

  button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* --- Log --- */
  .log {
    max-height: 180px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.8;
  }

  .log-line .t { color: var(--core-dim); margin-right: 8px; }
  .log-line.ok .t { color: var(--ok); }

  @media (max-width: 600px) {
    .data-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="frame">

  <div class="title-row">
    <div class="title">VADER</div>
    <div class="timestamp" id="clock">—</div>
  </div>

  <div class="core-wrap">
    <div class="core idle" id="core">
      <div class="core-dot"></div>
    </div>
    <div class="status-label" id="statusLabel">IDLE</div>
    <div class="status-sub" id="statusSub">Awaiting next scheduled briefing</div>
  </div>

  <div class="panel">
    <div class="panel-label">Data Sources</div>
    <div class="data-grid" id="dataGrid">
      <div class="data-item" data-key="weather"><span><span class="dot"></span>Weather</span></div>
      <div class="data-item" data-key="calendar"><span><span class="dot"></span>Calendar</span></div>
      <div class="data-item" data-key="tasks"><span><span class="dot"></span>Tasks</span></div>
      <div class="data-item" data-key="email"><span><span class="dot"></span>Email</span></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-label">Briefing</div>
    <div class="briefing-text placeholder" id="briefingText">No briefing generated yet today.</div>
  </div>

  <div class="panel">
    <div class="panel-label">Activity Log</div>
    <div class="log" id="log"></div>
  </div>

  <div class="controls">
    <button id="runBtn" onclick="runBriefing()">Run Briefing Now</button>
  </div>

</div>

<script>
  const core = document.getElementById('core');
  const statusLabel = document.getElementById('statusLabel');
  const statusSub = document.getElementById('statusSub');
  const briefingText = document.getElementById('briefingText');
  const log = document.getElementById('log');
  const runBtn = document.getElementById('runBtn');
  const clock = document.getElementById('clock');

  function updateClock() {
    const now = new Date();
    clock.textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + ' · ' +
      now.toLocaleDateString([], {month: 'short', day: 'numeric'});
  }
  updateClock();
  setInterval(updateClock, 1000 * 30);

  function setCore(state) {
    core.className = 'core ' + state;
  }

  function setStatus(label, sub) {
    statusLabel.textContent = label;
    statusSub.textContent = sub;
  }

  function addLog(message, ok=false) {
    const line = document.createElement('div');
    line.className = 'log-line' + (ok ? ' ok' : '');
    const t = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
    line.innerHTML = `<span class="t">[${t}]</span>${message}`;
    log.prepend(line);
  }

  function markSource(key, state) {
    const el = document.querySelector(`.data-item[data-key="${key}"]`);
    if (!el) return;
    el.classList.remove('active', 'done');
    if (state) el.classList.add(state);
  }

  async function runBriefing() {
    runBtn.disabled = true;
    setCore('working');
    setStatus('GATHERING', 'Pulling data from connected sources');
    addLog('Briefing run started');

    await fetch('/api/run', { method: 'POST' });
    pollState();
  }

  let pollTimer = null;
  const sourceOrder = ['weather', 'calendar', 'tasks', 'email'];
  let sourcesMarked = 0;

  async function pollState() {
    if (pollTimer) clearTimeout(pollTimer);

    const res = await fetch('/api/state');
    const state = await res.json();

    // Render any new log lines we haven't shown yet
    while (sourcesMarked < state.log.length) {
      const entry = state.log[sourcesMarked];
      addLog(entry, true);
      const matchedSource = sourceOrder.find(s => entry.toLowerCase().includes(s));
      if (matchedSource) markSource(matchedSource, 'done');
      sourcesMarked++;
    }

    if (state.status === 'working') {
      setStatus('GATHERING', 'Pulling data and synthesizing briefing');
    } else if (state.status === 'speaking') {
      setCore('speaking');
      setStatus('SPEAKING', 'Delivering briefing aloud');
      if (state.briefing_text) {
        briefingText.textContent = state.briefing_text;
        briefingText.classList.remove('placeholder');
      }
    } else if (state.status === 'idle' && sourcesMarked > 0) {
      setCore('idle');
      setStatus('IDLE', 'Briefing complete — awaiting tomorrow');
      runBtn.disabled = false;
      return; // stop polling once finished
    }

    pollTimer = setTimeout(pollState, 800);
  }
</script>

</body>
</html>
