# Railway deployment config.
# Railway auto-detects the Dockerfile to build the image; this just adds the
# health check / restart behavior (mirrors render.yaml).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
